name: Android Release

# Builds a SIGNED release APK + AAB and attaches them to a GitHub Release.
# Triggered by pushing a tag matching v* (e.g. v1.0.0).
#
# Requires four repository secrets (see PLAN.md Phase B / RELEASE.md):
#   KEYSTORE_B64   — base64 of the release .jks (never committed anywhere)
#   KEYSTORE_PASS  — keystore password
#   KEY_ALIAS      — key alias inside the keystore
#   KEY_PASS       — key password
#
# If these secrets are not set, this workflow will fail at the "Build signed
# release" step — the debug workflow (.github/workflows/android.yml) is
# unaffected and keeps building the unsigned debug APK on every push to main.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build signed release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "${{ runner.temp }}/release.jks"

      - name: Build signed release APK + AAB
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASS }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASS }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Checksum artifacts
        run: |
          cd app/build/outputs
          sha256sum apk/release/*.apk bundle/release/*.aab | tee SHA256SUMS.txt

      - name: Remove decoded keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release.jks"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/SHA256SUMS.txt
