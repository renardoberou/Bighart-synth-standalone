    });

    });

SynthEngine.prototype.resume=function(){

  if(this.ctx.state==='suspended'||this.ctx.state==='interrupted'){

function makeVCOSwitch(vcoIdx){

  var modes=['on','off','drone'],labels=['ON','OFF','DRN'],colors=[C.amber,C.red,C.green];
  var btns=[];

    var cur=state.params[modeKey];
    btns.forEach(function(b,i){

      b.style.border='1px solid '+(on?colors[i]+'99':C.border);
      b.style.boxShadow=on?('0 0 8px '+colors[i]+'44'):'none';

// ── VERTICAL VOLUME FADER ─────────────────────────────────────────────────────
function makeVFader(initVal,volKey,accent){
  accent=accent||C.amber;
  var val=initVal,H=90,TH=16;var tl=H-TH;
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',flexShrink:'0',userSelect:'none'}});
  var lbl=el('div',{style:{fontSize:'7px',color:accent,fontFamily:"'Courier New',monospace",letterSpacing:'1px',opacity:'.75',textAlign:'center',fontWeight:'700'}},'VOL');
  var track=el('div',{style:{position:'relative',width:'20px',height:H+'px',cursor:'ns-resize',display:'flex',justifyContent:'center'}});
  var trackBg=el('div',{style:{position:'absolute',left:'50%',transform:'translateX(-50%)',top:TH/2+'px',bottom:TH/2+'px',width:'4px',background:C.panelDeep,borderRadius:'2px',boxShadow:'inset 0 1px 3px rgba(0,0,0,.6)'}});
  var fill=el('div',{style:{position:'absolute',bottom:'0',width:'100%',background:'linear-gradient(180deg,'+accent+','+accent+'44)',borderRadius:'2px',transition:'none'}});
  trackBg.appendChild(fill);track.appendChild(trackBg);
  [0,.25,.5,.75,1].forEach(function(t){track.appendChild(el('div',{style:{position:'absolute',left:'1px',right:'1px',top:(TH/2+t*tl-.5)+'px',height:'1px',background:t===.5?C.borderLt:C.border,pointerEvents:'none'}}));});
  var thumb=el('div',{style:{position:'absolute',left:'50%',transform:'translateX(-50%)',width:'20px',height:TH+'px',borderRadius:'4px',background:'linear-gradient(180deg,#EBE2CE 0%,#C8B090 55%,#A08060 100%)',border:'1px solid '+accent+'88',boxShadow:'0 2px 6px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.55),inset 0 -1px 0 rgba(0,0,0,.2)',cursor:'ns-resize',touchAction:'none',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'2'}});
  thumb.appendChild(el('div',{style:{width:'10px',height:'2px',background:accent,borderRadius:'1px',opacity:'.95',boxShadow:'0 0 5px '+accent+',0 0 10px '+accent+'66'}}));
  track.appendChild(thumb);
  function setVal(v){
    val=Math.min(1,Math.max(0,v));
    var p2=1-val; // invert: top=max
    thumb.style.top=(p2*tl)+'px';
    fill.style.height=(val*(H-TH))+'px';
    fill.style.bottom=(TH/2)+'px';
  }
  setVal(val);
  var drag={active:false,startY:0,startVal:0};
  function onMove(e){if(!drag.active)return;var dy=e.clientY-drag.startY;setVal(drag.startVal-dy/tl);state.params[volKey]=val;engine.setParam(volKey,val);}
  function onUp(){drag.active=false;window.removeEventListener('pointermove',onMove);window.removeEventListener('pointerup',onUp);}
  thumb.addEventListener('pointerdown',function(e){e.preventDefault();e.stopPropagation();drag={active:true,startY:e.clientY,startVal:val};window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp);});
  track.addEventListener('pointerdown',function(e){if(e.target===thumb)return;var r=track.getBoundingClientRect();var ratio=Math.min(1,Math.max(0,1-(e.clientY-r.top-TH/2)/tl));setVal(ratio);state.params[volKey]=val;engine.setParam(volKey,val);drag={active:true,startY:e.clientY,startVal:val};window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp);});
  wrap.appendChild(lbl);wrap.appendChild(track);
  return{el:wrap,setValue:setVal,getValue:function(){return val;}};
}

var seqAStepEls=[];
function makeSeqAStep(idx){

  var syncLed=makeLed(C.green,7);syncLed.set(step.syncPulse);

  btn.appendChild(lockPip);

  var ledRowEl=el('div',{style:{display:'flex',gap:'2px',justifyContent:'center'}},ledPlay.el,ledSel.el);
  var col=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},ledRowEl,syncLed.el,btn,numLbl);
  function refreshBtn(){
    var has=step.note!==null,isSel=state.selStep===idx,isPlay=state.curStepA===idx&&state.playing;
    var bg,border,tc;
    if(isSel){bg=C.sky+'33';border=C.sky+'99';tc=C.skyLt;}
    else if(has){bg=isPlay?C.amber+'55':C.amber+'18';border=isPlay?C.amber+'cc':C.amber+'55';tc=isPlay?C.amberLt:C.amber;}
    else{bg=isPlay?C.amber+'18':C.panelAlt;border=isPlay?C.amber+'55':C.border;tc=C.textDm;}
    btn.style.background=bg;btn.style.border='1px solid '+border;btn.style.color=tc;
    btn.childNodes[0].textContent=has?NOTE_NAMES[step.note%12]:'\u00b7';
    // Lock pip: amber=wave, sky=cutoff, copperLt=both
    var hw=!!step.waves,hc=step.cutoff!=null;
    if(hw&&hc){lockPip.style.display='block';lockPip.style.background=C.copperLt;lockPip.style.boxShadow='0 0 4px '+C.copperLt;}
    else if(hw){lockPip.style.display='block';lockPip.style.background=C.amberLt;lockPip.style.boxShadow='0 0 4px '+C.amber;}
    else if(hc){lockPip.style.display='block';lockPip.style.background=C.skyLt;lockPip.style.boxShadow='0 0 4px '+C.sky;}

  }

    _lpMoved=false;_lpX=e.clientX;_lpY=e.clientY;

      _lpTimer=null; // marks that long-press fired

      if(typeof openInspector==='function')openInspector(idx);
    },320);
  });
  btn.addEventListener('pointermove',function(e){
    if(_lpTimer&&(Math.abs(e.clientX-_lpX)+Math.abs(e.clientY-_lpY))>6){
      clearTimeout(_lpTimer);_lpTimer=null;_lpMoved=true;
    }
  });
  btn.addEventListener('pointerup',function(){
    btn.style.transform='scale(1)';

    if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
    if(fired||_lpMoved){_lpMoved=false;return;}
    _lpMoved=false;
    // Normal tap
    if(state.recMode==='step'){state.selStep=(state.selStep===idx)?null:idx;seqAStepEls.forEach(function(s){s.refresh();});}

var LS_KEY='bighart_user_presets_v2';
function _lsAvailable(){try{localStorage.setItem('__bh_test','1');localStorage.removeItem('__bh_test');return true;}catch(e){return false;}}
function loadUserPresets(){
  if(!_lsAvailable())return[];
  try{var raw=localStorage.getItem(LS_KEY);return raw?JSON.parse(raw):[];}
  catch(e){return[];}
}
function saveUserPresets(arr){
  if(!_lsAvailable()){alert('Your browser does not allow storage in this context.\nTry saving the file to disk and opening it directly.');return false;}

// ── APPLY PRESET (load params + optional bpm, restart active drones) ──────────
function applyPreset(preset){
  var p=preset.p;
  // Stop playback and reset sequencer state
  if(state.playing)togglePlay();
  // Stop any active drones before applying
  for(var di=0;di<3;di++){if(engine.droneActive[di])engine.setDrone(di,false);}
  // Ensure vco volumes reset to 1 if preset predates volume params
  var defaults={vco1Vol:1,vco2Vol:1,vco3Vol:1};
  Object.keys(defaults).forEach(function(k){if(p[k]==null)p[k]=defaults[k];});
  // Apply all params
  Object.keys(p).forEach(function(k){
    state.params[k]=p[k];engine.params[k]=p[k];
    if(engine.ctx)engine.setParam(k,p[k]);
  });
  if(preset.bpm){state.bpm=p.bpm||preset.bpm;if(window._bpmWidget)window._bpmWidget(state.bpm);}
  // Load seqA if provided — deep copy so each preset keeps its own data
  if(preset.seqA){
    state.seqA=preset.seqA.map(function(s){return{note:s.note,rootNote:s.rootNote||s.note,active:s.active,syncPulse:!!s.syncPulse,waves:s.waves?{v1:s.waves.v1,v2:s.waves.v2,v3:s.waves.v3}:null,cutoff:(s.cutoff!=null)?s.cutoff:null};});
    for(var si=0;si<64;si++){var _s2=state.seqA[si];seqAStepEls[si].step.note=_s2.note;seqAStepEls[si].step.rootNote=_s2.rootNote;seqAStepEls[si].step.active=_s2.active;seqAStepEls[si].step.syncPulse=_s2.syncPulse;seqAStepEls[si].step.waves=_s2.waves;seqAStepEls[si].step.cutoff=_s2.cutoff;}
  } else {
    state.seqA.forEach(function(s){s.note=null;s.rootNote=null;s.active=false;s.syncPulse=false;s.waves=null;s.cutoff=null;});
  }
  // Load seqB if provided
  if(preset.seqB){
    for(var bi=0;bi<4;bi++){state.seqB[bi].note=preset.seqB[bi]?preset.seqB[bi].note:null;state.seqB[bi].active=preset.seqB[bi]?!!preset.seqB[bi].active:false;}
  } else {
    state.seqB.forEach(function(s){s.note=null;s.active=false;});
  }
  if(preset.seqBOn!=null)state.seqBOn=preset.seqBOn;
  if(preset.seqBRate)state.seqBRate=preset.seqBRate;
  // Reset UI state
  state.selStep=null;state.curStepA=-1;
  if(typeof openInspector==='function')openInspector(null);
  state.seqAEnabledPages=[true,true,true,true];
  state.pageDir=['fwd','fwd','fwd','fwd'];
  state.pageRate=[1,1,1,1];
  state.pageRndCache=[null,null,null,null];
  state.mutateEntropy=0;
  state.mutateScale=null;state.mutateInterval=null;state.mutateCollapse=false;
  if(window._mutateRefreshUI)window._mutateRefreshUI();
  // Re-sync page loop-enable button visuals
  if(typeof loopBtns!=='undefined')loopBtns.forEach(function(lb){lb.style.background=C.green+'22';lb.style.color=C.greenLt;lb.style.border='1px solid '+C.green+'88';lb.style.boxShadow='0 0 5px '+C.green+'55';lb.textContent='\u25cf';});
  // Refresh sequencer UI
  if(typeof setSeqPage==='function'){setSeqPage(0);}
  if(typeof seqAStepEls!=='undefined')seqAStepEls.forEach(function(s){s.refresh();});
  if(typeof seqBStepEls!=='undefined')seqBStepEls.forEach(function(s){s.refresh();});
  pushToScheduler();
  // Restart drones if preset has any
  var droneKeys=['vco1Mode','vco2Mode','vco3Mode'];
  droneKeys.forEach(function(k,i){if(p[k]==='drone'&&engine.ctx){setTimeout(function(){engine.setDrone(i,true);},100);}});
  // Rebuild all VCO UI widgets
  if(window._refreshVcoUI)window._refreshVcoUI();
}

  // ── TRANSPORT ───────────────────────────────────────────────────────────────
  // ── MUTATION ENGINE ───────────────────────────────────────────────────────────
  var NOTE_MIN=24,NOTE_MAX=95;
  var _mutTickCounter=0;
  var WAVE_IDS=['sawtooth','sharkfin','ultrasaw','sine','pulse','buchla'];

  // Scale pitch-class sets (absolute, rooted at C=0)
  var SCALES={
    maj:[0,2,4,5,7,9,11],
    min:[0,2,3,5,7,8,10],
    dor:[0,2,3,5,7,9,10],
    phr:[0,1,3,5,7,8,10],

    loc:[0,1,3,5,6,8,10]

  // Snap a MIDI note to the nearest degree of a scale (pitch-class set)
  function _snapToScale(note,pcs){
    var pc=((note%12)+12)%12;
    var oct=Math.floor(note/12);
    var best=pcs[0],bestDist=13;
    for(var i=0;i<pcs.length;i++){
      var d=Math.min(Math.abs(pcs[i]-pc),12-Math.abs(pcs[i]-pc));
      if(d<bestDist){bestDist=d;best=pcs[i];}
    }
    var snapped=oct*12+best;
    if(snapped<NOTE_MIN)snapped+=12;
    if(snapped>NOTE_MAX)snapped-=12;
    return Math.max(NOTE_MIN,Math.min(NOTE_MAX,snapped));
  }

  // Build jump pool: fifths+octaves of root, or single interval if freeze is set
  function _jumpPool(root){
    var ivl=state.mutateInterval;
    var offsets=ivl!=null?[-ivl,ivl]:[-24,-19,-12,-7,7,12,19,24];
    var pool=[root]; // always include root as return target
    for(var oi=0;oi<offsets.length;oi++){
      var n=root+offsets[oi];
      if(n>=NOTE_MIN&&n<=NOTE_MAX)pool.push(n);
    }
    return pool;
  }

  function _mutationTick(){
    var changed=false;
    var entropy=state.mutateEntropy;
    var pcs=state.mutateScale?SCALES[state.mutateScale]:null;
    var collapse=state.mutateCollapse;
    if(entropy<=0&&!collapse)return;

    for(var si=0;si<64;si++){
      var s=state.seqA[si];
      if(!s.active||s.note===null)continue;
      if(s.rootNote==null)s.rootNote=s.note;

      // ── OCTAVE COLLAPSE — pull note toward rootNote's octave, one step per tick ──
      if(collapse){
        var diff=s.note-s.rootNote;
        if(diff>=12){s.note-=12;changed=true;}
        else if(diff<=-12){s.note+=12;changed=true;}
      }

      if(entropy<=0)continue;

      // ── ENTROPY: pitch jump ────────────────────────────────────────────────────
      if(Math.random()<entropy*0.7){
        var pool=_jumpPool(s.rootNote);
        var target=pool[Math.floor(Math.random()*pool.length)];
        // Modal lock: snap to scale if active
        if(pcs)target=_snapToScale(target,pcs);
        target=Math.max(NOTE_MIN,Math.min(NOTE_MAX,target));
        s.note=target;
        changed=true;
      }
      // ── Wave lock mutation ─────────────────────────────────────────────────────
      if(Math.random()<entropy*0.35){
        var vcos=['v1','v2','v3'];
        var numVcos=1+Math.floor(Math.random()*3);
        var waveSet={};
        for(var vi=0;vi<numVcos;vi++){
          waveSet[vcos[vi]]=WAVE_IDS[Math.floor(Math.random()*WAVE_IDS.length)];
        }
        s.waves=s.waves?Object.assign({},s.waves,waveSet):waveSet;
        changed=true;
      }
      // ── Filter nudge — only if step already has a cutoff override ─────────────
      if(s.cutoff!=null&&Math.random()<entropy*0.5){
        s.cutoff=Math.max(0,Math.min(1,s.cutoff+(Math.random()*0.3-0.15)*entropy));
        changed=true;
      }
    }

    if(changed){
      pushToScheduler();
      queueRAF(function(){seqAStepEls.forEach(function(st){st.refresh();});});
    }
  }

    seqAStepEls.forEach(function(s){s.refresh();});
    if(isSt){recLbl.style.display='block';recLbl.style.color=C.sky;recLbl.style.animation='blink 1.4s infinite';recLbl.textContent='\u25c8 STEP \u2014 SELECT A STEP THEN PRESS A PAD';}
    else{recLbl.style.display='none';}
  }
  // Wire transport to window for media session actions
  window._transportPlay=function(){if(!state.playing)togglePlay();};
  window._transportStop=function(){if(state.playing)togglePlay();};
  // ── Start MIDI ──────────────────────────────────────────────────────────
  MIDI.init();
}
// ════════════════════════════════════════════════════════════════════════════
// THE BIGHART — WEB MIDI ENGINE
// CC mapping · MIDI Learn · Pitch Bend · Sustain Pedal · MIDI Clock Sync
// ════════════════════════════════════════════════════════════════════════════
var MIDI={
  access:null, inputs:[], activeInput:'all',
  learning:false, learnTarget:null,
  bendRange:2, bendCents:0,
  sustainHeld:false, sustainedNotes:[],
  clockEnabled:false, clockBPM:0,
  _clockTimes:[], _clockIdx:0, _clockCount:0,
  _lastClockTs:0,

  // ── Default CC map ────────────────────────────────────────────────────────
  // paramKey → CC number; overridden by MIDI Learn, saved to localStorage
  ccMap:{
    lfoCutoff:1, masterVol:7, lfoRate:3, lfoPitch:9,
    vco1Vol:16, vco2Vol:17, vco3Vol:18,
    peak:71, decayRelease:72, attack:73,
    cutoff:74, hpfCutoff:75, ms20lpfCutoff:76,
    reverbMix:91, delayMix:93, distMix:94, ms20lpfPeak:71
  },
  // reverse map: cc# → paramKey (built from ccMap)
  _ccToParam:{},

  // ── Init ──────────────────────────────────────────────────────────────────
  init:function(){
    var self=this;
    // Load saved CC map from localStorage
    try{
      var saved=localStorage.getItem('bighart_midi_cc_map');
      if(saved)self.ccMap=JSON.parse(saved);
    }catch(e){}
    this._buildReverse();

    if(!navigator.requestMIDIAccess){
      MIDI._updateStatus('NOT SUPPORTED','#b83030');return;
    }
    navigator.requestMIDIAccess({sysex:false}).then(
      function(acc){
        self.access=acc;
        self._onStateChange();
        acc.onstatechange=function(){self._onStateChange();};
        MIDI._updateStatus('READY','#2a9462');
      },
      function(err){
        // Access denied (e.g. permissions policy in an iframe) — fail silently,
        // surface only as a status label on the MIDI tab.
        MIDI._updateStatus('BLOCKED — CHECK BROWSER PERMISSIONS','#b83030');
      }
    );
  },

  _buildReverse:function(){
    this._ccToParam={};
    var self=this;
    Object.keys(this.ccMap).forEach(function(param){
      self._ccToParam[self.ccMap[param]]=param;
    });
  },

  _onStateChange:function(){
    if(!this.access)return;
    var self=this;
    this.inputs=[];
    this.access.inputs.forEach(function(input){
      self.inputs.push(input);
      input.onmidimessage=function(e){self._onMessage(e);};
    });
    var count=this.inputs.length;
    MIDI._updateStatus(count>0?(count+' DEVICE'+(count>1?'S':''))+' CONNECTED':'NO DEVICES','#2a9462');
    MIDI._refreshDeviceList();
  },

  // ── Message handler ───────────────────────────────────────────────────────
  _onMessage:function(e){
    var d=e.data;
    if(!d||d.length<1)return;
    var status=d[0]&0xF0;
    var ch=(d[0]&0x0F);

    // Flash activity LED
    MIDI._flashLED();

    // ── Note On ──────────────────────────────────────────────────────────────
    if(status===0x90&&d.length>=3&&d[2]>0){
      var note=d[1], vel=d[2]/127;
      if(this.sustainHeld){
        // Remove from sustained list if retriggered
        var idx=this.sustainedNotes.indexOf(note);
        if(idx>-1)this.sustainedNotes.splice(idx,1);
      }
      engine.init();engine.resume();
      engine.noteOn(note, vel*vel*0.9+0.1, null); // slight vel curve
      return;
    }
    // ── Note Off (or Note On vel=0) ───────────────────────────────────────
    if(status===0x80||(status===0x90&&d[2]===0)){
      var note2=d[1];
      if(this.sustainHeld){
        if(this.sustainedNotes.indexOf(note2)===-1)
          this.sustainedNotes.push(note2);
      } else {
        engine.noteOff(note2);
      }
      return;
    }
    // ── Pitch Bend ────────────────────────────────────────────────────────
    if(status===0xE0&&d.length>=3){
      var raw=((d[2]<<7)|d[1])-8192; // -8192..+8191
      this.bendCents=(raw/8192)*this.bendRange*100;
      this._applyBend();
      return;
    }
    // ── CC ─────────────────────────────────────────────────────────────────
    if(status===0xB0&&d.length>=3){
      var cc=d[1], val=d[2];

      // ── MIDI Learn: grab CC ──────────────────────────────────────────────
      if(this.learning&&this.learnTarget){
        this.ccMap[this.learnTarget]=cc;
        this._buildReverse();
        this._saveMap();
        this.learning=false;
        MIDI._updateStatus('MAPPED: '+this.learnTarget+' → CC '+cc,'#f0a840');
        MIDI._refreshLearnUI();
        MIDI._refreshCCList();
        setTimeout(function(){
          MIDI._updateStatus(MIDI.inputs.length>0?MIDI.inputs.length+' DEVICE(S) CONNECTED':'READY','#2a9462');
        },2500);
        return;
      }

      // ── Sustain pedal (CC 64) ────────────────────────────────────────────
      if(cc===64){
        var wasHeld=this.sustainHeld;
        this.sustainHeld=(val>=64);
        if(wasHeld&&!this.sustainHeld){
          // Release all sustained notes
          var self2=this;
          this.sustainedNotes.forEach(function(n){engine.noteOff(n);});
          this.sustainedNotes=[];
        }
        return;
      }
      // ── All Notes Off (CC 123) / All Sound Off (CC 120) ──────────────────
      if(cc===123||cc===120){engine.allNotesOff();this.sustainedNotes=[];return;}

      // ── Regular CC → param ───────────────────────────────────────────────
      var paramKey=this._ccToParam[cc];
      if(paramKey){
        var norm=val/127;
        state.params[paramKey]=norm;
        engine.setParam(paramKey,norm);
        MIDI._refreshKnobUI(paramKey,norm);
      }
      return;
    }
    // ── Program Change → load preset ─────────────────────────────────────
    if(status===0xC0&&d.length>=2){
      var pgm=d[1];
      var allPresets=FACTORY_PRESETS.concat(loadUserPresets());
      if(pgm<allPresets.length)applyPreset(allPresets[pgm]);
      return;
    }
    // ── MIDI Clock (0xF8) ─────────────────────────────────────────────────
    if(d[0]===0xF8){this._onClock(e.timeStamp);return;}
    if(d[0]===0xFA||d[0]===0xFB){this._clockTimes=[];this._clockCount=0;return;}
    if(d[0]===0xFC){this.clockBPM=0;MIDI._updateClockDisplay();return;}
  },

  // ── Pitch bend: update all active oscillators ─────────────────────────────
  _applyBend:function(){
    var cents=this.bendCents;
    // Apply to all active voices via osc.detune
    Object.values(engine.activeVoices||{}).forEach(function(v){
      if(!v||!v.oscs)return;
      v.oscs.forEach(function(osc,i){
        if(!osc)return;
        // Base detune was (i-1)*dc — add bend on top
        var dc=(engine.params.detune||0)*60;
        var base=(i-1)*dc;
        osc.detune.setTargetAtTime(base+cents,engine.ctx.currentTime,0.005);
      });
    });
    // Drone oscillators
    (engine.droneOscs||[]).forEach(function(osc){
      if(osc)osc.detune.setTargetAtTime(cents,engine.ctx.currentTime,0.005);
    });
  },

  // ── MIDI Clock → BPM detection ────────────────────────────────────────────
  _onClock:function(ts){
    if(!this.clockEnabled)return;
    if(this._lastClockTs>0){
      var interval=(ts-this._lastClockTs)/1000; // seconds
      if(interval>0&&interval<2){
        this._clockTimes[this._clockIdx%24]=interval;
        this._clockIdx++;
        var filled=Math.min(this._clockIdx,24);
        var sum=0;
        for(var i=0;i<filled;i++)sum+=this._clockTimes[i];
        var avgInterval=sum/filled;
        var bpm=60/(avgInterval*24);
        if(Math.abs(bpm-this.clockBPM)>0.3){
          this.clockBPM=bpm;
          // Sync BPM widget
          if(window._bpmWidget)window._bpmWidget(Math.round(bpm));
          MIDI._updateClockDisplay();
        }
      }
    }
    this._lastClockTs=ts;
    this._clockCount++;
  },

  // ── MIDI Learn ────────────────────────────────────────────────────────────
  startLearn:function(paramKey){
    this.learning=true;
    this.learnTarget=paramKey;
    MIDI._updateStatus('MOVE A KNOB ON YOUR CONTROLLER…','#f0a840');
  },
  cancelLearn:function(){
    this.learning=false;this.learnTarget=null;
    MIDI._updateStatus('READY','#2a9462');
    MIDI._refreshLearnUI();
  },

  // ── Map/unmap ─────────────────────────────────────────────────────────────
  resetMap:function(){
    this.ccMap={
      lfoCutoff:1,masterVol:7,lfoRate:3,lfoPitch:9,
      vco1Vol:16,vco2Vol:17,vco3Vol:18,
      peak:71,decayRelease:72,attack:73,
      cutoff:74,hpfCutoff:75,ms20lpfCutoff:76,
      reverbMix:91,delayMix:93,distMix:94
    };
    this._buildReverse();this._saveMap();
    MIDI._refreshCCList();
  },
  _saveMap:function(){
    try{localStorage.setItem('bighart_midi_cc_map',JSON.stringify(this.ccMap));}catch(e){}
  },

  // ── Knob UI sync: update fader/slider visuals when CC arrives ────────────
  _knobRefs:{},
  registerKnob:function(paramKey,updateFn){this._knobRefs[paramKey]=updateFn;},
  _refreshKnobUI:function(paramKey,norm){
    if(this._knobRefs[paramKey])this._knobRefs[paramKey](norm);
  },

  // ── UI helpers (populated after buildApp creates elements) ────────────────
  _statusEl:null, _ledEl:null, _clockEl:null, _deviceListEl:null,
  _ccListEl:null, _learnBtnEl:null, _learnSelEl:null,
  _ledTimer:null,
  _updateStatus:function(msg,col){
    if(this._statusEl){this._statusEl.textContent=msg;this._statusEl.style.color=col||'#9a8a6a';}
  },
  _updateClockDisplay:function(){
    if(this._clockEl)this._clockEl.textContent=this.clockBPM>0?('CLK: '+Math.round(this.clockBPM)+' BPM'):'CLK: --';
  },
  _flashLED:function(){
    if(!this._ledEl)return;
    this._ledEl.style.background='#f0a840';
    this._ledEl.style.boxShadow='0 0 8px #f0a840';
    clearTimeout(this._ledTimer);
    this._ledTimer=setTimeout(function(){
      if(MIDI._ledEl){MIDI._ledEl.style.background='#2a9462';MIDI._ledEl.style.boxShadow='0 0 4px #2a9462';}
    },80);
  },
  _refreshDeviceList:function(){
    if(!this._deviceListEl)return;
    this._deviceListEl.innerHTML='';
    var self=this;
    if(this.inputs.length===0){
      var li=document.createElement('div');
      li.style.cssText='color:#5a5040;font-size:9px;padding:4px 0';
      li.textContent='No MIDI devices found';
      this._deviceListEl.appendChild(li);return;
    }
    this.inputs.forEach(function(input,i){
      var li=document.createElement('div');
      li.style.cssText='display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #3A3530';
      var dot=document.createElement('span');
      dot.style.cssText='width:7px;height:7px;border-radius:50%;background:#2a9462;flex-shrink:0';
      var name=document.createElement('span');
      name.style.cssText='color:#9a8a6a;font-size:9px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
      name.textContent=input.name;
      li.appendChild(dot);li.appendChild(name);
      self._deviceListEl.appendChild(li);
    });
  },
  _refreshCCList:function(){
    if(!this._ccListEl)return;
    this._ccListEl.innerHTML='';
    var self=this;
    // CC PARAM list sorted by CC number
    var entries=[];
    Object.keys(this.ccMap).forEach(function(param){
      entries.push({cc:self.ccMap[param],param:param});
    });
    entries.sort(function(a,b){return a.cc-b.cc;});
    entries.forEach(function(e){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:0;padding:2px 0;border-bottom:1px solid #1e1a2c';
      var ccSpan=document.createElement('span');
      ccSpan.style.cssText='color:#d4882a;font-size:8px;width:36px;flex-shrink:0;font-weight:700';
      ccSpan.textContent='CC '+e.cc;
      var arr=document.createElement('span');
      arr.style.cssText='color:#3a3050;font-size:8px;width:14px;text-align:center;flex-shrink:0';
      arr.textContent='→';
      var pSpan=document.createElement('span');
      pSpan.style.cssText='color:#9a8a6a;font-size:8px;flex:1';
      pSpan.textContent=e.param;
      // Learn button per row
      var lBtn=document.createElement('button');
      lBtn.textContent='LRN';
      lBtn.style.cssText='background:#27231A;border:1px solid #4A4438;color:#5a5040;font-size:7px;padding:1px 4px;border-radius:3px;cursor:pointer;font-family:Courier New,monospace;flex-shrink:0';
      lBtn.addEventListener('click',(function(pk){return function(){MIDI.startLearn(pk);MIDI._refreshLearnUI(pk);};})(e.param));
      row.appendChild(ccSpan);row.appendChild(arr);row.appendChild(pSpan);row.appendChild(lBtn);
      self._ccListEl.appendChild(row);
    });
  },
  _refreshLearnUI:function(activeParam){
    if(!this._learnBtnEl)return;
    if(this.learning&&activeParam){
      this._learnBtnEl.textContent='✕ CANCEL';
      this._learnBtnEl.style.color='#f0a840';
      this._learnBtnEl.style.borderColor='#f0a840';
    } else {
      this._learnBtnEl.textContent='LEARN';
      this._learnBtnEl.style.color='#9a8a6a';
      this._learnBtnEl.style.borderColor='#4A4438';
    }
  }
};

// ── BUILD MIDI PANEL UI ──────────────────────────────────────────────────────
function buildMidiPanel(){
  var C2=C; // reuse colour palette
  var panel=el('div',{style:{background:C2.panelAlt,borderRadius:'12px',border:'1px solid '+C2.border,padding:'10px 12px 12px',marginBottom:'6px'}});

  // ── Header row ────────────────────────────────────────────────────────────
  var hdr=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}});
  var titleLbl=el('span',{style:{fontSize:'8px',color:C2.textDm,fontFamily:"'Courier New',monospace",fontWeight:'700',letterSpacing:'3px',flex:'1'}},'MIDI');
  // Activity LED
  var led=el('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:'#3a3050',flexShrink:'0',transition:'all .08s'}});
  MIDI._ledEl=led;
  // Status text
  var statusLbl=el('span',{style:{fontSize:'8px',color:'#5a5040',fontFamily:"'Courier New',monospace",flex:'2',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},'INITIALISING…');
  MIDI._statusEl=statusLbl;
  hdr.appendChild(titleLbl);hdr.appendChild(led);hdr.appendChild(statusLbl);
  panel.appendChild(hdr);

  // ── Device list ───────────────────────────────────────────────────────────
  var devLbl=el('div',{style:{fontSize:'7px',color:C2.textDm,letterSpacing:'2px',marginBottom:'3px',fontFamily:"'Courier New',monospace"}},'DEVICES');
  var devList=el('div',{style:{marginBottom:'8px',minHeight:'18px'}});
  MIDI._deviceListEl=devList;
  panel.appendChild(devLbl);panel.appendChild(devList);

  // ── Bend range + Clock row ─────────────────────────────────────────────────
  var row1=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',flexWrap:'wrap'}});
  // Bend range
  var bendLbl=el('span',{style:{fontSize:'8px',color:C2.textDm,fontFamily:"'Courier New',monospace",flexShrink:'0'}},'BEND:');
  var bendSel=el('select',{style:{background:C2.panelDeep,color:C2.amber,border:'1px solid '+C2.border,borderRadius:'4px',fontSize:'9px',padding:'2px 4px',fontFamily:"'Courier New',monospace",flexShrink:'0'}});
  [1,2,3,5,7,12].forEach(function(n){
    var opt=document.createElement('option');opt.value=n;opt.textContent='±'+n+' ST';
    if(n===2)opt.selected=true;
    bendSel.appendChild(opt);
  });
  bendSel.addEventListener('change',function(){MIDI.bendRange=+bendSel.value;});
  // Clock sync toggle
  var clkChk=el('input',{type:'checkbox',style:{accentColor:C2.amber,cursor:'pointer'}});
  var clkLbl=el('label',{style:{fontSize:'8px',color:C2.textDm,fontFamily:"'Courier New',monospace",display:'flex',alignItems:'center',gap:'4px',cursor:'pointer'}});
  var clkTxt=document.createTextNode('CLK SYNC');
  clkLbl.appendChild(clkChk);clkLbl.appendChild(clkTxt);
  clkChk.addEventListener('change',function(){MIDI.clockEnabled=clkChk.checked;MIDI._updateClockDisplay();});
  var clockDisp=el('span',{style:{fontSize:'8px',color:C2.amber,fontFamily:"'Courier New',monospace",marginLeft:'auto'}},'CLK: --');
  MIDI._clockEl=clockDisp;
  row1.appendChild(bendLbl);row1.appendChild(bendSel);row1.appendChild(clkLbl);row1.appendChild(clockDisp);
  panel.appendChild(row1);

  // ── CC assignments ─────────────────────────────────────────────────────────
  var ccHdr=el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px'}});
  var ccLbl=el('div',{style:{fontSize:'7px',color:C2.textDm,letterSpacing:'2px',fontFamily:"'Courier New',monospace",flex:'1'}},'CC ASSIGNMENTS');
  var resetBtn=el('button',{style:{background:'transparent',border:'1px solid '+C2.border,color:C2.textDm,fontSize:'7px',padding:'1px 5px',borderRadius:'3px',cursor:'pointer',fontFamily:"'Courier New',monospace"}},'RESET');
  resetBtn.addEventListener('click',function(){MIDI.resetMap();});
  ccHdr.appendChild(ccLbl);ccHdr.appendChild(resetBtn);
  panel.appendChild(ccHdr);

  var ccList=el('div',{style:{maxHeight:'130px',overflowY:'auto',marginBottom:'8px',background:C2.panelDeep,borderRadius:'6px',padding:'4px 6px',border:'1px solid '+C2.border}});
  MIDI._ccListEl=ccList;
  panel.appendChild(ccList);

  // ── MIDI Learn row ─────────────────────────────────────────────────────────
  var learnHdr=el('div',{style:{fontSize:'7px',color:C2.textDm,letterSpacing:'2px',fontFamily:"'Courier New',monospace",marginBottom:'3px'}},'MIDI LEARN');
  panel.appendChild(learnHdr);
  var learnRow=el('div',{style:{display:'flex',gap:'6px',alignItems:'center'}});
  var learnSel=el('select',{style:{flex:'1',background:C2.panelDeep,color:C2.text,border:'1px solid '+C2.border,borderRadius:'4px',fontSize:'9px',padding:'3px 4px',fontFamily:"'Courier New',monospace"}});
  // Populate with all automatable params
  var learnableParams=[
    'cutoff','peak','egCutoff','ms20lpfCutoff','ms20lpfPeak','hpfCutoff','hpfPeak',
    'attack','decayRelease','lfoRate','lfoPitch','lfoCutoff',
    'distGain','distMix','delayTime','delayFeedback','delayMix',
    'reverbSize','reverbMix','vco1Vol','vco2Vol','vco3Vol',
    'detune','pwmWidth','masterVol'
  ];
  learnableParams.forEach(function(p){
    var opt=document.createElement('option');opt.value=p;opt.textContent=p;learnSel.appendChild(opt);
  });
  MIDI._learnSelEl=learnSel;
  var learnBtn=el('button',{style:{background:'transparent',border:'1px solid '+C2.border,color:C2.text,fontSize:'8px',padding:'3px 8px',borderRadius:'4px',cursor:'pointer',fontFamily:"'Courier New',monospace",flexShrink:'0',fontWeight:'700'}},'LEARN');
  MIDI._learnBtnEl=learnBtn;
  learnBtn.addEventListener('click',function(){
    if(MIDI.learning){MIDI.cancelLearn();}
    else{MIDI.startLearn(learnSel.value);}
  });
  learnRow.appendChild(learnSel);learnRow.appendChild(learnBtn);
  panel.appendChild(learnRow);

  // Refresh CC list initial state
  setTimeout(function(){MIDI._refreshCCList();MIDI._refreshDeviceList();},100);
  return panel;
}
buildApp();
